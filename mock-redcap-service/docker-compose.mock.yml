version: "3.8"

services:
  # ─── NEPS Backend (includes mock REDCap) ───
  neps-backend:
    build:
      context: ../neps-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://neps:neps_password@postgres:5432/neps_db
      - REDCAP_API_URL=http://localhost:8000/api/redcap
      - REDCAP_MOCK_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - neps-network
    volumes:
      - ../neps-backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─── NEPS Portal ───
  neps-portal:
    build:
      context: ../neps-portal
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_REDCAP_MOCK=true
    depends_on:
      - neps-backend
    networks:
      - neps-network

  # ─── NEPS ML/AI ───
  neps-ml-ai:
    build:
      context: ../neps-ml-ai
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://neps:neps_password@postgres:5432/neps_db
      - REDCAP_API_URL=http://neps-backend:8000/api/redcap
      - REDCAP_MOCK_ENABLED=true
    depends_on:
      - postgres
      - neps-backend
    networks:
      - neps-network

  # ─── NEPS Data Platform ───
  neps-data-platform:
    build:
      context: ../neps-data-platform
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://neps:neps_password@postgres:5432/neps_db
      - REDCAP_API_URL=http://neps-backend:8000/api/redcap
      - REDCAP_MOCK_ENABLED=true
    depends_on:
      - postgres
      - neps-backend
    networks:
      - neps-network

  # ─── Shared Services ───
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: neps
      POSTGRES_PASSWORD: neps_password
      POSTGRES_DB: neps_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - neps-network

  redis:
    image: redis:7-alpine
    networks:
      - neps-network

  # ─── Monitoring ───
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - neps-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - neps-network

networks:
  neps-network:
    driver: bridge

volumes:
  postgres-data:
